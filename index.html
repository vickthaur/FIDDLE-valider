<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation - FIDDLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { padding: 30px; border-radius: 20px; background: #262626; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80%; max-width: 400px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ff7675; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-icon { font-size: 50px; color: #10b981; display: none; }
        .error-icon { font-size: 50px; color: #ef4444; display: none; }
        h1 { font-size: 1.2rem; margin: 15px 0; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #ff7675; color: white; text-decoration: none; border-radius: 10px; font-weight: 600; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="loader" class="loader"></div>
    <div id="successIcon" class="success-icon">✅</div>
    <div id="errorIcon" class="error-icon">❌</div>
    
    <h1 id="statusText">Validation du point en cours...</h1>
    <p id="emailDisplay" style="color: #aaa; font-size: 0.9rem;"></p>

    <a href="https://vickthaur.github.io/FIDDLE-valider/scanner.html" id="btnBack" class="btn">Scanner un autre client</a>
</div>

<script>
    // 1. Récupération de l'email dans l'URL
    const urlParams = new URLSearchParams(window.location.search);
    const emailClient = urlParams.get('email');
    const statusText = document.getElementById('statusText');
    const emailDisplay = document.getElementById('emailDisplay');

    if (emailClient) {
        emailDisplay.innerText = emailClient;
        validerPoint(emailClient);
    } else {
        showError("Aucun client détecté.");
    }

    async function validerPoint(email) {
        const apiKey = "TA_CLE_API_BREVO_ICI"; // ⚠️ METS TA CLÉ ICI
        const listId = 5; // ⚠️ METS TON ID DE LISTE "PASSAGE" ICI

        try {
            const response = await fetch(`https://api.brevo.com/v3/contacts/lists/${listId}/contacts/add`, {
                method: 'POST',
                headers: {
                    'accept': 'application/json',
                    'api-key': apiKey,
                    'content-type': 'application/json'
                },
                body: JSON.stringify({ emails: [email] })
            });

            if (response.ok) {
                showSuccess("Point ajouté avec succès !");
            } else {
                showError("Erreur lors de l'envoi.");
            }
        } catch (error) {
            showError("Problème de connexion.");
        }
    }

    function showSuccess(msg) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('successIcon').style.display = 'block';
        statusText.innerText = msg;
        statusText.style.color = "#10b981";
        document.getElementById('btnBack').style.display = 'inline-block';
    }

    function showError(msg) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('errorIcon').style.display = 'block';
        statusText.innerText = msg;
        statusText.style.color = "#ef4444";
        document.getElementById('btnBack').style.display = 'inline-block';
        document.getElementById('btnBack').innerText = "Réessayer";
    }
</script>

</body>
</html>
