<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation - FIDDLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { padding: 30px; border-radius: 20px; background: #262626; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 85%; max-width: 400px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ff7675; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-icon { font-size: 50px; color: #10b981; display: none; }
        .error-icon { font-size: 50px; color: #ef4444; display: none; }
        h1 { font-size: 1.2rem; margin: 15px 0; }
        #errorMessage { color: #ef4444; font-size: 0.8rem; margin-top: 10px; display: none; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 5px; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #ff7675; color: white; text-decoration: none; border-radius: 10px; font-weight: 600; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="loader" class="loader"></div>
    <div id="successIcon" class="success-icon">✅</div>
    <div id="errorIcon" class="error-icon">❌</div>
    
    <h1 id="statusText">Validation du point...</h1>
    <p id="emailDisplay" style="color: #aaa; font-size: 0.9rem; font-weight: bold;"></p>
    <div id="errorMessage"></div>

    <a href="https://vickthaur.github.io/FIDDLE-valider/scanner.html" id="btnBack" class="btn">Scanner un autre client</a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const emailClient = urlParams.get('email');
    const statusText = document.getElementById('statusText');
    const emailDisplay = document.getElementById('emailDisplay');
    const errorMessage = document.getElementById('errorMessage');

    // CONFIGURATION AUTOMATISÉE
    const API_KEY = "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"; 
    const LIST_ID = 5; 

    if (emailClient && emailClient.includes('@')) {
        emailDisplay.innerText = emailClient;
        validerPoint(emailClient);
    } else {
        showError("Email invalide ou scan incorrect.");
    }

    async function validerPoint(email) {
        try {
            const response = await fetch(`https://api.brevo.com/v3/contacts/lists/${LIST_ID}/contacts/add`, {
                method: 'POST',
                headers: {
                    'accept': 'application/json',
                    'api-key': API_KEY,
                    'content-type': 'application/json'
                },
                body: JSON.stringify({ emails: [email] })
            });

            const result = await response.json();

            if (response.ok) {
                showSuccess("Point ajouté avec succès !");
            } else {
                let msg = "Erreur Brevo";
                if (result.message && result.message.includes("exist")) {
                    msg = "Client inconnu (Inscrivez-le d'abord !)";
                }
                showError(msg, result.message || "");
            }
        } catch (error) {
            showError("Problème de connexion.");
        }
    }

    function showSuccess(msg) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('successIcon').style.display = 'block';
        statusText.innerText = msg;
        statusText.style.color = "#10b981";
        document.getElementById('btnBack').style.display = 'inline-block';
    }

    function showError(msg, technicalDetails = "") {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('errorIcon').style.display = 'block';
        statusText.innerText = msg;
        statusText.style.color = "#ef4444";
        if(technicalDetails) {
            errorMessage.innerText = technicalDetails;
            errorMessage.style.display = 'block';
        }
        document.getElementById('btnBack').style.display = 'inline-block';
        document.getElementById('btnBack').innerText = "Réessayer";
    }
</script>
</body>
</html>
